<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Cropper</title>
    <link rel="stylesheet" href="./index.css">
    <script type="module" src="./index.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="node_modules/croppie/croppie.css" />
    <script src="node_modules/croppie/croppie.js"></script>
</head>
<body>
    <p>You can crop image and download after</p>
    <div class="buttons">
        <label for="uploader" id="upload_button_label">Upload Image</label>
        <input type="file" id="uploader" accept="image/*" hidden>
        <button id="crop_button">Crop Image</button>
        <button id="download_button">Download Image</button>
    </div>
    <div id="cropper_container">
        <img id="uploaded_picture">
    </div>
</body>
</html>
